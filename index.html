<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点眼チェック表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  background: #f5f5f5;
  min-height: 100vh;
}

/* ===== 操作パネル ===== */
.controls {
  background: #fff;
  padding: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: center;
  justify-content: center;
  border-bottom: 2px solid #ddd;
}
.controls label {
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.controls select {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 18px;
  padding: 8px 12px;
  border: 2px solid #333;
  border-radius: 6px;
}
.controls button {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 18px;
  padding: 12px 32px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.controls button:hover { background: #1d4ed8; }

/* ===== プレビュー ===== */
.preview-wrapper {
  padding: 20px;
  display: flex;
  justify-content: center;
}

/* ===== PDF用カレンダー ===== */
#calendar {
  width: 297mm;
  height: 210mm;
  background: #fff;
  padding: 0.5mm 5mm;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.cal-title {
  text-align: center;
  font-size: 20pt;
  padding: 2mm 0 1.5mm;
  letter-spacing: 2px;
}
.cal-table {
  flex: 1;
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.cal-table th, .cal-table td {
  border: 1.5px solid #333;
  text-align: center;
  vertical-align: middle;
  padding: 0;
}
.cal-table th {
  font-size: 13pt;
  height: 8mm;
}
/* ラベル列 */
.label-col {
  width: 12mm;
  font-size: 13pt;
}

/* 曜日色 */
.sun, .holiday { color: #dc2626; }
.sat { color: #2563eb; }
.th-sun { background: #fef2f2; color: #dc2626; }
.th-sat { background: #eff6ff; color: #2563eb; }

/* 日付行 */
.row-date td { font-size: 18pt; }
/* チェック行 */
.row-check td { }
</style>
</head>
<body>

<div class="controls">
  <label>年：
    <select id="year"></select>
  </label>
  <label>月：
    <select id="month"></select>
  </label>
  <label>対象の眼：
    <select id="eye">
      <option value="左眼">左眼</option>
      <option value="右眼">右眼</option>
      <option value="両眼">両眼</option>
    </select>
  </label>
  <label>1日の回数：
    <select id="freq">
      <option value="1">1回</option>
      <option value="2">2回（朝・夕）</option>
    </select>
  </label>
  <button onclick="generatePDF()">PDF作成</button>
</div>

<div class="preview-wrapper">
  <div id="calendar"></div>
</div>

<script>
// ---------- 祝日判定 ----------
function getHolidays(year) {
  const holidays = {};
  const add = (m, d, name) => { holidays[`${m}-${d}`] = name; };

  add(1, 1, '元日');
  add(1, nthWeekday(year, 1, 1, 2), '成人の日');
  add(2, 11, '建国記念の日');
  add(2, 23, '天皇誕生日');
  const shunbun = Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  add(3, shunbun, '春分の日');
  add(4, 29, '昭和の日');
  add(5, 3, '憲法記念日');
  add(5, 4, 'みどりの日');
  add(5, 5, 'こどもの日');
  add(7, nthWeekday(year, 7, 1, 3), '海の日');
  add(8, 11, '山の日');
  add(9, nthWeekday(year, 9, 1, 3), '敬老の日');
  const shubun = Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  add(9, shubun, '秋分の日');
  add(10, nthWeekday(year, 10, 1, 2), 'スポーツの日');
  add(11, 3, '文化の日');
  add(11, 23, '勤労感謝の日');

  // 振替休日
  const keys = Object.keys(holidays);
  for (const key of keys) {
    const [m, d] = key.split('-').map(Number);
    const date = new Date(year, m - 1, d);
    if (date.getDay() === 0) {
      let next = new Date(date);
      next.setDate(next.getDate() + 1);
      while (holidays[`${next.getMonth() + 1}-${next.getDate()}`]) {
        next.setDate(next.getDate() + 1);
      }
      holidays[`${next.getMonth() + 1}-${next.getDate()}`] = '振替休日';
    }
  }
  return holidays;
}

function nthWeekday(year, month, weekday, n) {
  let d = new Date(year, month - 1, 1);
  let count = 0;
  while (true) {
    if (d.getDay() === weekday) count++;
    if (count === n) return d.getDate();
    d.setDate(d.getDate() + 1);
  }
}

// ---------- カレンダー描画 ----------
function renderCalendar() {
  const year = parseInt(document.getElementById('year').value);
  const month = parseInt(document.getElementById('month').value);
  const eye = document.getElementById('eye').value;
  const freq = parseInt(document.getElementById('freq').value);
  const holidays = getHolidays(year);

  const firstDay = new Date(year, month - 1, 1);
  const lastDate = new Date(year, month, 0).getDate();
  const startDow = firstDay.getDay();

  const weeks = Math.ceil((startDow + lastDate) / 7);
  const dayNames = ['日', '月', '火', '水', '木', '金', '土'];

  // 各週の行数: 1回→2行(日付+チェック)、2回→3行(日付+朝+夜)
  const rowsPerWeek = freq === 1 ? 2 : 3;
  // A4横: 210mm, padding上下0.5mm×2, タイトル約10mm, ヘッダー8mm, 罫線余白5mm
  const availH = 210 - 1 - 10 - 8 - 4.5;
  // 全行を均等割り
  const totalRows = weeks * rowsPerWeek;
  const rowH = Math.floor(availH / totalRows * 10) / 10;
  const dateRowH = rowH;
  const checkRowH = rowH;

  let html = `<div class="cal-title">点眼チェック表　${year}年${month}月　${eye}　1日${freq}回</div>`;
  html += '<table class="cal-table"><colgroup>';
  if (freq === 2) html += '<col style="width:12mm">';
  for (let i = 0; i < 7; i++) html += '<col>';
  html += '</colgroup>';

  // ヘッダー
  html += '<thead><tr>';
  if (freq === 2) html += '<th class="label-col"></th>';
  dayNames.forEach((dn, i) => {
    const cls = i === 0 ? 'th-sun' : i === 6 ? 'th-sat' : '';
    html += `<th class="${cls}">${dn}</th>`;
  });
  html += '</tr></thead><tbody>';

  // 各日のデータを準備
  let day = 1;
  for (let w = 0; w < weeks; w++) {
    const days = [];
    for (let d = 0; d < 7; d++) {
      const idx = w * 7 + d;
      if (idx < startDow || day > lastDate) {
        days.push(null);
      } else {
        const isHoliday = holidays[`${month}-${day}`];
        let cls = '';
        if (isHoliday || d === 0) cls = 'holiday';
        else if (d === 6) cls = 'sat';
        days.push({ num: day, cls: cls });
        day++;
      }
    }

    // 日付行
    html += `<tr class="row-date" style="height:${dateRowH}mm">`;
    if (freq === 2) html += '<td class="label-col"></td>';
    for (let d = 0; d < 7; d++) {
      const dd = days[d];
      if (dd) {
        html += `<td class="${dd.cls}">${dd.num}</td>`;
      } else {
        html += '<td></td>';
      }
    }
    html += '</tr>';

    if (freq === 1) {
      // チェック行（1回）
      html += `<tr class="row-check" style="height:${checkRowH}mm">`;
      for (let d = 0; d < 7; d++) {
        html += '<td></td>';
      }
      html += '</tr>';
    } else {
      // 朝行
      html += `<tr class="row-check" style="height:${checkRowH}mm">`;
      html += '<td class="label-col">朝</td>';
      for (let d = 0; d < 7; d++) {
        html += '<td></td>';
      }
      html += '</tr>';
      // 夜行
      html += `<tr class="row-check" style="height:${checkRowH}mm">`;
      html += '<td class="label-col">夜</td>';
      for (let d = 0; d < 7; d++) {
        html += '<td></td>';
      }
      html += '</tr>';
    }
  }
  html += '</tbody></table>';

  document.getElementById('calendar').innerHTML = html;
}

// ---------- PDF生成 ----------
function generatePDF() {
  renderCalendar();
  const el = document.getElementById('calendar');
  const year = document.getElementById('year').value;
  const month = document.getElementById('month').value;
  const eye = document.getElementById('eye').value;

  const opt = {
    margin: 0,
    filename: `点眼チェック表_${year}年${month}月_${eye}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
  };
  html2pdf().set(opt).from(el).save();
}

// ---------- 初期化 ----------
(function init() {
  const now = new Date();
  const yearSel = document.getElementById('year');
  const monthSel = document.getElementById('month');

  for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 2; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '年';
    if (y === now.getFullYear()) opt.selected = true;
    yearSel.appendChild(opt);
  }
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m + '月';
    if (m === now.getMonth() + 1) opt.selected = true;
    monthSel.appendChild(opt);
  }

  yearSel.addEventListener('change', renderCalendar);
  monthSel.addEventListener('change', renderCalendar);
  document.getElementById('eye').addEventListener('change', renderCalendar);
  document.getElementById('freq').addEventListener('change', renderCalendar);

  renderCalendar();
})();
</script>
</body>
</html>
